# ============================================
# CORE
# ============================================
baseURL: "https://vakesz.com/"
title: "vakesz.com"
theme: "PaperMod"
languageCode: "en-us"
defaultContentLanguage: "en"

# ============================================
# BUILD
# ============================================
timeout: "30s"
enableRobotsTXT: true
enableGitInfo: true
enableEmoji: true
buildDrafts: false
buildFuture: false
buildExpired: false
canonifyURLs: true

minify:
  disableXML: true
  minifyOutput: true
  tdewolff:
    html:
      keepWhitespace: false
    css:
      version: 2
    js:
      keepVarNames: false

pagination:
  pagerSize: 10

security:
  exec:
    allow: ['^go$', '^git$', '^npx$', '^postcss$']

# ============================================
# THEME PARAMS
# ============================================
params:
  env: production

  # SEO & Meta
  description: "Personal blog of vakesz - Software Engineer sharing insights on backend development, C/Python programming, automotive tech, and personal adventures"
  author: "Gabor Pinkova"
  keywords:
    - "software engineer"
    - "backend developer"
    - "C programming"
    - "Python"
    - "embedded systems"
    - "automotive software"
    - "tech blog"
    - "homelab"
    - "vakesz"

  # OpenGraph & Twitter
  images: ["/img/cover-default.webp"]
  twitter:
    card: "summary_large_image"
    site: "@vakeszqe"
    creator: "@vakeszqe"

  # Schema.org
  schema:
    publisherType: "Person"
    sameAs:
      - "https://github.com/vakesz"
      - "https://twitter.com/vakeszqe"
      - "https://linkedin.com/in/gabor-pinkova"
      - "https://instagram.com/vakeszqe"
      - "https://youtube.com/@vakeszqe"

  # Theme
  defaultTheme: "auto"

  # Display
  ShowReadingTime: true
  ShowShareButtons: false
  ShowPostNavLinks: false
  ShowWordCount: false
  ShowCodeCopyButtons: true
  ShowBreadCrumbs: true
  ShowToc: false
  TocOpen: false
  ShowFullTextinRSS: true
  ShowRssButtonInSectionTermList: true
  ShowAllPagesInArchive: true
  UseHugoToc: true

  cover:
    linkFullImages: true
    responsiveImages: true

  # Profile
  profileMode:
    enabled: true
    title: "vakesz"
    subtitle: "Software Engineer | Backend Developer | Tech Tinkerer"
    imageUrl: "img/me.webp"
    imageTitle: "vakesz"
    imageWidth: 150
    imageHeight: 150
    buttons:
      - name: "Posts"
        url: "/posts"
      - name: "About"
        url: "/about"
      - name: "Search"
        url: "/search"

  # Social
  socialIcons:
    - name: "github"
      url: "https://github.com/vakesz"
    - name: "twitter"
      url: "https://twitter.com/vakeszqe"
    - name: "linkedin"
      url: "https://linkedin.com/in/gabor-pinkova"
    - name: "instagram"
      url: "https://instagram.com/vakeszqe"
    - name: "youtube"
      url: "https://youtube.com/@vakeszqe"
    - name: "rss"
      url: "/index.xml"

  # Comments (Giscus)
  comments: true
  giscus:
    repo: "vakesz/vakesz-comments"
    repoId: "R_kgDOPORzRA"
    category: "Comments"
    categoryId: "DIC_kwDOPORzRM4CtP6v"
    mapping: "pathname"
    strict: "0"
    reactionsEnabled: "1"
    emitMetadata: "0"
    inputPosition: "bottom"
    lightTheme: "noborder_light"
    darkTheme: "noborder_gray"
    lang: "en"
    loading: "lazy"

  # Search (Fuse.js)
  fuseOpts:
    isCaseSensitive: false
    threshold: 0.4
    minMatchCharLength: 2
    distance: 1000
    limit: 10
    keys: ["title", "permalink", "summary", "content", "tags"]

  # Assets
  assets:
    disableFingerprinting: false
    favicon: "favicon.ico"
    favicon16x16: "favicon-16x16.png"
    favicon32x32: "favicon-32x32.png"
    apple_touch_icon: "apple-touch-icon.png"
    theme_color: "#2e2e33"
    msapplication_TileColor: "#2e2e33"

  # Footer
  footer:
    text: "© vakesz.com"
    hideCopyright: true

  # Edit Post
  editPost:
    URL: "https://github.com/vakesz/vakesz/tree/main/content"
    Text: "Suggest Changes"
    appendFilePath: true

# ============================================
# CONTENT
# ============================================
menu:
  main:
    - identifier: "posts"
      name: "Posts"
      url: "/posts/"
      weight: 10
    - identifier: "archives"
      name: "Archives"
      url: "/archives/"
      weight: 20
    - identifier: "about"
      name: "About"
      url: "/about/"
      weight: 30
    - identifier: "search"
      name: "Search"
      url: "/search/"
      weight: 40

markup:
  highlight:
    anchorLineNos: false
    codeFences: true
    guessSyntax: true
    lineNos: false
    noClasses: false
    style: dracula
    tabWidth: 4
  goldmark:
    extensions:
      definitionList: true
      footnote: true
      linkify: true
      strikethrough: true
      table: true
      taskList: true
      typographer: true
    renderer:
      unsafe: false
      hardWraps: false

outputs:
  home: ["HTML", "RSS", "JSON"]
  page: ["HTML"]
  section: ["HTML", "RSS"]
  taxonomy: ["HTML", "RSS"]
  term: ["HTML", "RSS"]

sitemap:
  filename: "sitemap.xml"

taxonomies:
  tag: tags
  category: categories
  series: series

related:
  includeNewer: true
  threshold: 80
  toLower: true
  indices:
    - name: tags
      weight: 100
    - name: categories
      weight: 80
    - name: date
      weight: 10

# ============================================
# SERVICES & PRIVACY
# ============================================
services:
  googleAnalytics:
    id: G-7FB5CVV3WZ
    consentMode: true

privacy:
  googleAnalytics:
    anonymizeIP: true
    respectDoNotTrack: true
    useSessionStorage: false
  x:
    enableDNT: true
  youtube:
    privacyEnhanced: true
