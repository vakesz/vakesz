baseURL: "https://vakesz.com/"
title: "vakesz.com"
theme: "PaperMod"
languageCode: "en-us"
defaultContentLanguage: "en"

enableRobotsTXT: true
buildDrafts: false
buildFuture: false
buildExpired: false
canonifyURLs: true
enableGitInfo: true
enableEmoji: true

# Performance
minify:
  disableXML: true
  minifyOutput: true
  tdewolff:
    html:
      keepWhitespace: false
    css:
      keepCSS2: true
    js:
      keepVarNames: false

# Pagination
pagination:
  disableAliases: false
  pagerSize: 10

# Security
security:
  exec:
    allow: ['^go$', '^git$', '^npx$', '^postcss$']

params:
  env: production

  # SEO Core
  title: "vakesz.com"
  description: "Personal blog of vakesz - Software Engineer sharing insights on backend development, C/Python programming, automotive tech, and personal adventures"
  author: "Gabor Pinkova"

  # OpenGraph & Twitter Cards
  images: ["/img/cover-default.webp"]
  twitter:
    card: "summary_large_image"
    site: "@vakeszqe"
    creator: "@vakeszqe"

  # Keywords (deduplicated and focused)
  keywords:
    - "software engineer"
    - "backend developer"
    - "C programming"
    - "Python"
    - "embedded systems"
    - "automotive software"
    - "tech blog"
    - "homelab"
    - "vakesz"

  # Theme Settings
  defaultTheme: "auto"
  disableThemeToggle: false

  # Display Settings
  ShowReadingTime: true
  ShowShareButtons: false
  ShowPostNavLinks: false
  ShowWordCount: false
  ShowCodeCopyButtons: true
  ShowBreadCrumbs: true
  ShowToc: false
  TocOpen: false
  ShowFullTextinRSS: true
  ShowRssButtonInSectionTermList: true
  ShowAllPagesInArchive: true
  UseHugoToc: true
  disableSpecial1stPost: false
  hidemeta: false
  hideSummary: false
  disableScrollToTop: false

  # Cover images
  cover:
    linkFullImages: true
    responsiveImages: true
    hidden: false
    hiddenInList: false
    hiddenInSingle: false

  # Schema.org structured data
  schema:
    publisherType: "Person"
    sameAs:
      - "https://github.com/vakesz"
      - "https://twitter.com/vakeszqe"
      - "https://linkedin.com/in/gabor-pinkova"
      - "https://instagram.com/vakeszqe"
      - "https://youtube.com/@vakeszqe"

  # Search Settings (Fuse.js)
  fuseOpts:
    isCaseSensitive: false
    shouldSort: true
    location: 0
    distance: 1000
    threshold: 0.4
    minMatchCharLength: 2
    limit: 10
    keys: ["title", "permalink", "summary", "content", "tags"]

  # Profile Mode
  profileMode:
    enabled: true
    title: "vakesz"
    subtitle: "Software Engineer | Backend Developer | Tech Tinkerer"
    imageUrl: "img/me.jpg"
    imageTitle: "vakesz"
    imageWidth: 150
    imageHeight: 150
    buttons:
      - name: "Posts"
        url: "/posts"
      - name: "About"
        url: "/about"
      - name: "Search"
        url: "/search"

  # Home info mode (alternative to profile, kept for reference)
  homeInfoParams:
    Title: "vakesz"
    Content: "Software Engineer | Backend Developer | Tech Tinkerer"

  # Footer
  footer:
    text: "© vakesz.com"
    hideCopyright: true

  # Assets
  assets:
    disableFingerprinting: false
    favicon: "favicon.ico"
    favicon16x16: "favicon-16x16.png"
    favicon32x32: "favicon-32x32.png"
    apple_touch_icon: "apple-touch-icon.png"
    theme_color: "#2e2e33"
    msapplication_TileColor: "#2e2e33"

  # Social Icons
  socialIcons:
    - name: "github"
      url: "https://github.com/vakesz"
    - name: "twitter"
      url: "https://twitter.com/vakeszqe"
    - name: "linkedin"
      url: "https://linkedin.com/in/gabor-pinkova"
    - name: "instagram"
      url: "https://instagram.com/vakeszqe"
    - name: "youtube"
      url: "https://youtube.com/@vakeszqe"
    - name: "rss"
      url: "/index.xml"

  # Share Buttons
  ShareButtons:
    - "linkedin"
    - "twitter"
    - "reddit"
    - "telegram"
    - "whatsapp"

  # Edit Post
  editPost:
    URL: "https://github.com/vakesz/vakesz/tree/main/content"
    Text: "Suggest Changes"
    appendFilePath: true

  # Comments - Giscus
  comments: true
  commentProvider: "giscus"
  giscus:
    repo: "vakesz/vakesz-comments"
    repoId: "R_kgDOPORzRA"
    category: "Comments"
    categoryId: "DIC_kwDOPORzRM4CtP6v"
    mapping: "pathname"
    strict: "0"
    reactionsEnabled: "1"
    emitMetadata: "0"
    inputPosition: "bottom"
    lightTheme: "noborder_light"
    darkTheme: "noborder_gray"
    lang: "en"
    loading: "lazy"

  # Analytics
  analytics:
    google:
      SiteVerificationTag: "wmIgcRkyiMpn8yLYNlSWr_CyKBP82dHZ0-edEILNaBY"

# Google Analytics
services:
  googleAnalytics:
    id: G-7FB5CVV3WZ
    consentMode: true

# Navigation Menu
menu:
  main:
    - identifier: "posts"
      name: "Posts"
      url: "/posts/"
      weight: 10
    - identifier: "archives"
      name: "Archives"
      url: "/archives/"
      weight: 20
    - identifier: "about"
      name: "About"
      url: "/about/"
      weight: 40
    - identifier: "search"
      name: "Search"
      url: "/search/"
      weight: 50

# Code highlighting
pygmentsUseClasses: true
markup:
  highlight:
    anchorLineNos: false
    codeFences: true
    guessSyntax: true
    lineNos: false
    noClasses: false
    style: dracula
    tabWidth: 4
  goldmark:
    extensions:
      definitionList: true
      footnote: true
      linkify: true
      strikethrough: true
      table: true
      taskList: true
      typographer: true
    renderer:
      unsafe: false
      hardWraps: false

# Outputs
outputs:
  home:
    - "HTML"
    - "RSS"
    - "JSON"
  page:
    - "HTML"
  section:
    - "HTML"
    - "RSS"
  taxonomy:
    - "HTML"
    - "RSS"
  term:
    - "HTML"
    - "RSS"

# Sitemap
sitemap:
  changefreq: "weekly"
  priority: 0.5
  filename: "sitemap.xml"

# Taxonomies
taxonomies:
  tag: tags
  category: categories
  series: series

# Related content
related:
  includeNewer: true
  threshold: 80
  toLower: true
  indices:
    - name: tags
      weight: 100
    - name: categories
      weight: 80
    - name: date
      weight: 10

# Privacy settings (GDPR-friendly)
privacy:
  googleAnalytics:
    anonymizeIP: true
    respectDoNotTrack: true
    useSessionStorage: false
  x:
    enableDNT: true
  youtube:
    privacyEnhanced: true
